<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>متجر الطيف | Al Taif Store</title>
    <style>
        :root { --primary: #d4af37; --bg: #000; --card-bg: #1a1a1a; --text: #fff; }
        
        * { box-sizing: border-box; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); color: var(--text); direction: rtl; }

        header { 
            background: #111; padding: 15px; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 1000;
        }
        .menu-btn { font-size: 25px; color: var(--primary); cursor: pointer; }

        /* القائمة الجانبية */
        .sidebar {
            position: fixed; right: -100%; top: 0; width: 260px; height: 100%;
            background: #111; z-index: 2001; transition: 0.3s; padding: 20px; border-left: 1px solid #333;
        }
        .sidebar.active { right: 0; }
        .search-box {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--primary);
            background: #222; color: #fff; margin: 15px 0; outline: none;
        }
        .sidebar a { display: block; color: #fff; text-decoration: none; padding: 15px; margin-bottom: 5px; background: #1a1a1a; border-radius: 8px; }

        /* الحاوية وتوسيط العناصر */
        .container { padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .category-group { width: 100%; max-width: 400px; margin-bottom: 30px; }
        .category-title { color: var(--primary); font-size: 1.2rem; margin: 10px 0; text-align: center; border-bottom: 1px solid #222; padding-bottom: 5px; }
        
        /* البطاقة في المنتصف */
        .product-card { 
            background: var(--card-bg); border-radius: 15px; border: 1px solid #333;
            width: 90%; margin: 10px auto; overflow: hidden; display: flex; flex-direction: column;
        }
        .product-card img { width: 100%; height: 200px; object-fit: cover; background: #fff; }
        
        .info { padding: 15px; text-align: center; }
        .info h3 { font-size: 1rem; margin: 5px 0; color: #fff; }
        .price { color: var(--primary); font-weight: bold; font-size: 1.1rem; display: block; margin: 10px 0; }
        
        .btn-add { 
            background: var(--primary); border: none; padding: 12px; border-radius: 10px; 
            width: 100%; cursor: pointer; font-weight: bold; font-size: 1rem; color: #000;
        }

        /* السلة */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; }
        .modal-content { 
            background: #1a1a1a; width: 85%; max-width: 320px; 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            border-radius: 20px; padding: 20px; border: 1px solid #444; text-align: center;
        }
        .cart-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #333; }

        .cart-trigger { position: fixed; left: 20px; bottom: 20px; background: var(--primary); color: #000; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 1000; box-shadow: 0 4px 15px rgba(212,175,55,0.4); }
        #cart-count { position: absolute; top: 0; right: 0; background: red; color: #fff; font-size: 12px; padding: 2px 7px; border-radius: 50%; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2000; }
    </style>
</head>
<body>

    <header>
        <div class="menu-btn" onclick="toggleSidebar()">☰</div>
        <h1>متجر الطيف | Al Taif</h1>
        <div style="width: 25px;"></div>
    </header>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
    
    <div class="sidebar" id="sidebar">
        <h3 style="color: var(--primary); margin-top: 0;">الأقسام والبحث 🔍</h3>
        <input type="text" id="searchInput" class="search-box" placeholder="ابحث عن قطعة..." onkeyup="searchProducts()">
        <a href="#peugeot307" onclick="toggleSidebar()">بيجو 307</a>
        <a href="#peugeot306" onclick="toggleSidebar()">بيجو 306</a>
        <a href="#peugeot406" onclick="toggleSidebar()">بيجو 406</a>
    </div>

    <div class="cart-trigger" onclick="openCart()">
        🛒 <span id="cart-count">0</span>
    </div>

    <div class="container">
        <div class="category-group" id="peugeot307">
            <div class="category-title">🚗 بيجو 307</div>
            <div class="product-card">
                <img src="https://via.placeholder.com/300x200?text=307+Part" alt="307">
                <div class="info">
                    </h3>مساعد دبل 307</h3>
                    <span class="price">7,500 IQD</span>
                    <button class="btn-add" onclick="addToCart('مساعد دبل 307', 7500)">إضافة للسلة</button>
                </div>
            </div>
        </div>

        <div class="category-group" id="peugeot306">
            <div class="category-title">🚗 بيجو 306</div>
            <div class="product-card">
                <img src="https://via.placeholder.com/300x200?text=306+Part" alt="306">
                <div class="info">
                    <h3>راديتر بيجو 306</h3>
                    <span class="price">55,000 IQD</span>
                    <button class="btn-add" onclick="addToCart('راديتر 306', 55000)">إضافة للسلة</button>
                </div>
            </div>
        </div>

        <div class="category-group" id="peugeot406">
            <div class="category-title">🚗 بيجو 406</div>
            <div class="product-card">
                <img src="https://via.placeholder.com/300x200?text=406+Part" alt="406">
                <div class="info">
                    <h3>فيتام شحن 406</h3>
                    <span class="price">30,000 IQD</span>
                    <button class="btn-add" onclick="addToCart('فيتام 406', 30000)">إضافة للسلة</button>
                </div>
            </div>
        </div>
    </div>

    <div id="cartModal" class="modal">
        <div class="modal-content">
            <h3 style="color: var(--primary); margin: 0 0 15px;">سلة التسوق 🛒</h3>
            <div id="cartList" style="max-height: 200px; overflow-y: auto;"></div>
            <div style="background:#222; padding:15px; border-radius:12px; margin:15px 0; border:1px solid var(--primary);">
                <span id="totalPrice" style="font-size: 1.3rem; font-weight: bold; color: var(--primary);">0 IQD</span>
            </div>
            <button onclick="checkout()" style="background:#2ecc71; color:white; width:100%; padding:15px; border-radius:12px; border:none; font-weight:bold; cursor:pointer;">إرسال للواتساب ✅</button>
            <button onclick="closeCart()" style="width:100%; background:none; border:none; color:#666; margin-top:15px; cursor:pointer;">إغلاق</button>
        </div>
    </div>

    <script>
        let cart = [];
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            let ov = document.getElementById('overlay');
            ov.style.display = (ov.style.display === 'block') ? 'none' : 'block';
        }
        function searchProducts() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('product-card');
            for (let i = 0; i < cards.length; i++) {
                let name = cards[i].querySelector('h3').innerText.toLowerCase();
                cards[i].style.display = name.includes(input) ? "flex" : "none";
            }
        }
        function addToCart(n, p) {
            let item = cart.find(i => i.name === n);
            if(item) item.qty++; else cart.push({name:n, price:p, qty:1});
            update();
        }
        function remove(idx) {
            if(cart[idx].qty > 1) cart[idx].qty--; else cart.splice(idx, 1);
            update();
        }
        function update() {
            const list = document.getElementById('cartList');
            let total = 0, count = 0;
            list.innerHTML = cart.length === 0 ? "<p style='opacity:0.5;'>السلة فارغة</p>" : "";
            cart.forEach((item, index) => {
                total += (item.price * item.qty);
                count += item.qty;
                list.innerHTML += `<div class="cart-item"><span>${item.name} ×${item.qty}</span><span style="color:red; cursor:pointer;" onclick="remove(${index})">حذف</span></div>`;
            });
            document.getElementById('cart-count').innerText = count;
            document.getElementById('totalPrice').innerText = total.toLocaleString() + " IQD";
        }
        function openCart() { document.getElementById('cartModal').style.display = 'block'; }
        function closeCart() { document.getElementById('cartModal').style.display = 'none'; }
        function checkout() {
            if(cart.length === 0) return;
            let msg = "طلب جديد من متجر الطيف:\n\n";
            cart.forEach(i => msg += `• ${i.name} [العدد: ${i.qty}]\n`);
            msg += `\n💰 المجموع: ${document.getElementById('totalPrice').innerText}`;
            window.open(`https://wa.me/9647734337432?text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
